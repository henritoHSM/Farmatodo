<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmaTodo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>💊 FarmaTodo</h1>
        <p>El más barato de Florida</p>
    </header>
    <section>
        <div>
            <input type="text" placeholder="Busca tu medicamento..." id="buscador">
            <p>Cargando medicamentos...</p>
        </div>
        <div id="lista-medicamentos"></div>
    </section>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Farmatodo/sw.js');
        }
    </script>
</body>
</html>
